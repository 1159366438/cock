<!DOCTYPE html>
<html>
<head>
    <title>Avatar Placeholders</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .avatar-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .avatar-item {
            text-align: center;
        }
        .avatar-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>
    <h2>系统头像预览</h2>
    <div class="avatar-container">
        <div class="avatar-item">
            <img src="avatar1.png" alt="Avatar 1" class="avatar-img" onerror="this.src='https://via.placeholder.com/100/007bff/ffffff?text=A'; this.onerror=null;">
            <p>头像1</p>
        </div>
        <div class="avatar-item">
            <img src="avatar2.png" alt="Avatar 2" class="avatar-img" onerror="this.src='https://via.placeholder.com/100/28a745/ffffff?text=B'; this.onerror=null;">
            <p>头像2</p>
        </div>
        <div class="avatar-item">
            <img src="avatar3.png" alt="Avatar 3" class="avatar-img" onerror="this.src='https://via.placeholder.com/100/dc3545/ffffff?text=C'; this.onerror=null;">
            <p>头像3</p>
        </div>
        <div class="avatar-item">
            <img src="avatar4.png" alt="Avatar 4" class="avatar-img" onerror="this.src='https://via.placeholder.com/100/ffc107/000000?text=D'; this.onerror=null;">
            <p>头像4</p>
        </div>
        <div class="avatar-item">
            <img src="avatar5.png" alt="Avatar 5" class="avatar-img" onerror="this.src='https://via.placeholder.com/100/17a2b8/ffffff?text=E'; this.onerror=null;">
            <p>头像5</p>
        </div>
    </div>
    <p>注意：如果头像图片未显示，将使用占位符图片替代。</p>
</body>
</html>
